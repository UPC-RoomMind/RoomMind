server:
  port: 8080
  tomcat:
    relaxed-query-chars: '|,{,},[,]'

spring:
  datasource:
    # 容器网桥互通，使用容器名mysql-dev，不再使用公网IP
    url: jdbc:mysql://mysql-dev:3306/dev_roommind?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-request-size: 100MB
      max-file-size: 100MB

  jackson:
    property-naming-strategy: UPPER_CAMEL_CASE
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  mail:
    host: smtp.163.com
    port: 465
    username: smallvnb@163.com
    password: CCS6fQ42U4CQiAJs
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
        debug: true

  rabbitmq:
    # 容器内网名称，替换公网IP
    host: rabbitmq-dev
    port: 5672
    username: dev_admin
    password: 123456
    virtual-host: dev_vhost
    connection-timeout: 5000ms
    requested-heartbeat: 30
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        concurrency: 5
        max-concurrency: 10
        prefetch: 1
        acknowledge-mode: manual
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms

  redis:
    # 新增Redis完整配置，匹配redis-dev容器
    host: redis-dev
    port: 6379
    password: 123456
    timeout: 5000ms

mybatis-plus:
  mapper-locations: mapper/*.xml
  type-aliases-package: com.example.web.entity
  global-config:
    db-config:
      table-prefix:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: false

logging:
  level:
    com.baomidou.mybatisplus: DEBUG
    org.mybatis: DEBUG

app:
  upload:
    path: /roommind/upload
    url-prefix: https://smallv.fun
    access-path: /test-uploads