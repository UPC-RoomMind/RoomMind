  jackson:
    property-naming-strategy: UPPER_CAMEL_CASE
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  mail:
    host: smtp.163.com
    port: 465
    username: smallvnb@163.com
    password: CCS6fQ42U4CQiAJs
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
        debug: true

  # rabbitmq 缩进在 spring 里面
  rabbitmq:
    # 连接配置
    host: 47.94.202.210
    port: 5672
    username: dev_admin
    password: 123456
    virtual-host: dev_vhost

    # 连接池配置
    connection-timeout: 5000ms
    requested-heartbeat: 30

    # 生产者确认
    publisher-confirm-type: correlated
    publisher-returns: true

    # 消费者配置
    listener:
      simple:
        concurrency: 5
        max-concurrency: 10
        prefetch: 1
        acknowledge-mode: manual  # 手动确认
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms

mybatis-plus:
