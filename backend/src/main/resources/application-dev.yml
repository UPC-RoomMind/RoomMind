mybatis-plus:
  mapper-locations: mapper/*.xml
  type-aliases-package: com.example.web.entity
  global-config:
    db-config:
      table-prefix:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: false

logging:
  level:
    com.baomidou.mybatisplus: DEBUG
    org.mybatis: DEBUG

app:
  upload:
    path: ./uploads
    url-prefix: http://localhost:8080

rabbitmq:
  # 连接配置
  host: localhost
  port: 5672
  username: admin          # 刚才创建的用户
  password: admin
  virtual-host: roomappoint # 刚才创建的虚拟主机

  # 连接池配置
  connection-timeout: 5000ms
  requested-heartbeat: 30

  # 生产者确认
  publisher-confirm-type: correlated
  publisher-returns: true

  # 消费者配置
  listener:
    simple:
      concurrency: 5
      max-concurrency: 10
      prefetch: 1
      acknowledge-mode: manual  # 手动确认
      retry:
        enabled: true
        max-attempts: 3
        initial-interval: 1000ms