version: "3.8"
services:
  roommind-dev:
    image: roommind:dev
    container_name: roommind-dev
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      TZ: Asia/Shanghai
    volumes:
      # 宿主机 roommind.jar → 容器内 /roommind/roommind.jar
      - ./roommind.jar:/roommind/roommind.jar
      # 日志挂载到容器 /roommind/logs，不再用 /app/logs
      - ./roommind-dev-logs:/roommind/logs
      # 上传文件挂载到容器 /roommind/upload
      - ./roommind-dev-upload:/roommind/upload
    networks:
      - dev_net
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 300m

networks:
  dev_net:
    external: true